# ArtEZ Notulist — configuratie
# Dit bestand wordt door de installer naar C:\ArtezNotulist\config.toml gekopieerd.
# Pas paden en modellen hier aan; de applicatie leest dit bij elke run opnieuw.

[paths]
root      = 'C:\ArtezNotulist'
inbox     = 'C:\ArtezNotulist\inbox'
output    = 'C:\ArtezNotulist\output'
logs      = 'C:\ArtezNotulist\logs'
templates = 'C:\ArtezNotulist\templates'
models    = 'C:\ArtezNotulist\models'

# LET OP: de installer overschrijft dit bestand met absolute paden.
# Dit is alleen de fallback als de installer niet heeft gedraaid.
[binaries]
ffmpeg      = 'C:\ArtezNotulist\bin\ffmpeg.exe'
whisper     = 'C:\ArtezNotulist\whisper\whisper-cli.exe'
pandoc      = 'C:\ArtezNotulist\bin\pandoc.exe'
wkhtmltopdf = 'C:\Program Files\wkhtmltopdf\bin\wkhtmltopdf.exe'

[whisper]
model_file = 'C:\ArtezNotulist\models\ggml-large-v3.bin'
threads    = 8
use_gpu    = true

[ollama]
host          = 'http://127.0.0.1:11434'
default_model = 'mistral'
# Modellen die in de UI kiesbaar zijn. Voeg hier nieuwe modellen toe
# (na `ollama pull <model>`), zonder de applicatie te hercompileren.
models        = ['mistral', 'llama3.1', 'qwen2.5', 'gemma2']
temperature   = 0.2
num_ctx       = 8192

[settings]
anonimiseren           = false
sprekerherkenning      = false
actiepuntenExtractie   = true
vertrouwelijkheidslabel = 'Intern'
huisstijlTemplate      = 'C:\ArtezNotulist\templates\artez_huisstijl.docx'
model                  = 'mistral'
taal                   = 'nl'
